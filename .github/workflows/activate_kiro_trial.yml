name: 激活 Kiro Trial (实验)
on:
  workflow_dispatch:
    inputs:
      target:
        description: '目标账号邮箱（留空=全部未激活的）'
        required: false
        default: ''

jobs:
  activate:
    runs-on: windows-2025
    timeout-minutes: 15
    concurrency:
      group: kiro-activate
      cancel-in-progress: false
    env:
      PYTHONIOENCODING: utf-8
    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        version: "latest"

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: uv sync

    - name: 下载安装 Kiro IDE
      shell: pwsh
      run: |
        # Try multiple known download URLs
        $urls = @(
          "https://desktop-release.q.us-east-1.amazonaws.com/latest/windows/nsis-web/x64/KiroSetup.exe",
          "https://desktop-release.q.us-east-1.amazonaws.com/latest/windows/KiroSetup.exe",
          "https://desktop-release.q.us-east-1.amazonaws.com/latest/Kiro-win32-x64.zip"
        )
        $downloaded = $false
        foreach ($url in $urls) {
          echo "[INFO] Trying: $url"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\KiroSetup.exe" -UseBasicParsing -ErrorAction Stop
            echo "[OK] Downloaded from: $url"
            $downloaded = $true
            break
          } catch {
            echo "[WARN] Failed: $_"
          }
        }
        if (-not $downloaded) {
          echo "[ERROR] All download URLs failed. Trying winget..."
          winget install --id Amazon.Kiro --accept-source-agreements --accept-package-agreements 2>&1
        }
        # Install if we got an exe
        if (Test-Path "$env:TEMP\KiroSetup.exe") {
          echo "[INFO] Installing..."
          Start-Process -FilePath "$env:TEMP\KiroSetup.exe" -ArgumentList "/S" -Wait -NoNewWindow
          Start-Sleep -Seconds 5
        }
        # Find Kiro.exe
        $kiroPath = "$env:LOCALAPPDATA\Programs\Kiro\Kiro.exe"
        if (-not (Test-Path $kiroPath)) {
          $found = Get-ChildItem -Path $env:LOCALAPPDATA,$env:PROGRAMFILES -Recurse -Filter "Kiro.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) { $kiroPath = $found.FullName }
        }
        echo "KIRO_PATH=$kiroPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "[RESULT] Kiro IDE at: $kiroPath (exists: $(Test-Path $kiroPath))"

    - name: 激活 Trial
      id: activate
      shell: pwsh
      env:
        WORKER_BASE: "https://worker-dashboard.ouraihub.workers.dev"
        CALLBACK_SECRET: ${{ secrets.WORKER_CALLBACK_SECRET }}
      run: |
        $target = "${{ inputs.target }}"
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null

        $headers = @{ "x-worker-token" = $env:CALLBACK_SECRET; "Content-Type" = "application/json" }
        $resp = Invoke-RestMethod -Uri "$env:WORKER_BASE/api/trigger" -Method POST -Headers $headers -Body '{"action":"list_kiro"}'
        $accounts = $resp.accounts

        $toActivate = @($accounts | Where-Object {
          $_.refresh_token -and ((-not $_.usage_limit) -or ($_.usage_limit -le 50))
        })
        if ($target) { $toActivate = @($toActivate | Where-Object { $_.username -eq $target }) }

        echo "Found $($toActivate.Count) accounts to activate"

        $results = @()
        foreach ($account in $toActivate) {
          echo "--- Activating: $($account.username) ---"

          # Write tokens to ~/.aws/sso/cache/
          $ssoDir = "$env:USERPROFILE\.aws\sso\cache"
          New-Item -ItemType Directory -Force -Path $ssoDir | Out-Null

          $sha1 = [System.Security.Cryptography.SHA1]::Create()
          $inputStr = '{"startUrl":"https://view.awsapps.com/start"}'
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($inputStr)
          $hash = ($sha1.ComputeHash($bytes) | ForEach-Object { $_.ToString("x2") }) -join ""

          @{ clientId=$account.client_id; clientSecret=$account.client_secret; expiresAt=(Get-Date).AddDays(90).ToString("yyyy-MM-ddTHH:mm:ss.fffZ") } | ConvertTo-Json | Out-File "$ssoDir\$hash.json" -Encoding utf8

          @{ accessToken=$account.access_token; refreshToken=$account.refresh_token; expiresAt=(Get-Date).AddHours(1).ToString("yyyy-MM-ddTHH:mm:ss.fffZ"); clientIdHash=$hash; authMethod="IdC"; provider="BuilderId"; region=($account.region ?? "us-east-1") } | ConvertTo-Json | Out-File "$ssoDir\kiro-auth-token.json" -Encoding utf8

          echo "[OK] Tokens written"

          # Launch Kiro IDE
          if ($env:KIRO_PATH -and (Test-Path $env:KIRO_PATH)) {
            echo "[INFO] Launching Kiro IDE for 30s..."
            $proc = Start-Process -FilePath $env:KIRO_PATH -PassThru
            Start-Sleep -Seconds 30
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            echo "[OK] Kiro IDE closed"
          } else {
            echo "[WARN] Kiro IDE not found at: $env:KIRO_PATH"
          }

          Start-Sleep -Seconds 5

          # Check trial
          $usageJson = uv run python python/src/scripts/check_kiro_trial.py $account.access_token 2>&1 | Select-Object -Last 1
          echo "Usage: $usageJson"

          try {
            $usage = $usageJson | ConvertFrom-Json
            $results += @{ username=$account.username; activated=$usage.activated; total_limit=$usage.total_limit; free_trial=$usage.free_trial }
          } catch {
            $results += @{ username=$account.username; activated=$false; error="parse_failed" }
          }

          Start-Sleep -Seconds 5
        }

        $results | ConvertTo-Json -Depth 3 -AsArray | Out-File artifacts/activate_results.json -Encoding utf8
        $activated = @($results | Where-Object { $_.activated }).Count
        echo "Results: $activated/$($results.Count) activated"

    - name: 上传结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: activate-results
        path: artifacts/

    - name: 回调 Worker
      if: always()
      shell: pwsh
      env:
        CALLBACK_URL: ${{ secrets.WORKER_CALLBACK_URL }}
        CALLBACK_SECRET: ${{ secrets.WORKER_CALLBACK_SECRET }}
      run: |
        if (-not $env:CALLBACK_URL) { echo "跳过回调"; exit 0 }
        if (-not (Test-Path artifacts/activate_results.json)) { echo "无结果"; exit 0 }
        $results = Get-Content artifacts/activate_results.json | ConvertFrom-Json
        foreach ($r in $results) {
          if ($r.activated) {
            $body = @{ secret=$env:CALLBACK_SECRET; action="batch_result"; data=@{ results=@(@{ username=$r.username; trial_activated=$true; usage_limit=$r.total_limit }) } } | ConvertTo-Json -Depth 4
            try { Invoke-RestMethod -Uri $env:CALLBACK_URL -Method POST -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json; charset=utf-8" } catch { echo "回调失败: $_" }
          }
        }
        echo "Done"
