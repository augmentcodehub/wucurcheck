# 数据源：Worker 传入的注册参数（数量、域名、密码、用户名组合）
# 触发方式：Worker「批量注册」按钮
# 用途：生成自然用户名 → 逐个注册 → 注册完自动签到 → 回调写入 KV
name: 批量注册账号
on:
  workflow_dispatch:
    inputs:
      count:
        description: '注册数量（默认10）'
        required: false
        default: '10'
        type: string
      email_prefix:
        description: '用户名组合（fruit+animal / plant+metal 等）'
        required: false
        default: 'fruit+animal'
        type: string
      email_domain:
        description: '邮箱域名'
        required: false
        default: 'qq.com'
        type: string
      password:
        description: '密码'
        required: false
        default: '123Claude&Codex'
        type: string
      callback_url:
        description: '回调地址'
        required: false
        default: ''
        type: string

jobs:
  register:
    runs-on: windows-2025
    environment: production
    env:
      PYTHONIOENCODING: utf-8
    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        version: "latest"

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 缓存 UV 依赖
      uses: actions/cache@v5
      id: uv-cache
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: 安装依赖
      if: steps.uv-cache.outputs.cache-hit != 'true'
      run: uv sync

    - name: 注册账号
      id: register
      env:
        PROVIDERS: ${{ secrets.PROVIDERS }}
      run: |
        New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
        $args = @(
          "python/src/cli/register.py",
          "--provider", "wucur",
          "--count", "${{ inputs.count }}",
          "--email-domain", "${{ inputs.email_domain }}",
          "--email-prefix", "${{ inputs.email_prefix }}",
          "--password", "${{ inputs.password }}",
          "--checkin",
          "--output", "artifacts/register_results.json",
          "--json"
        )
        uv run python @args

    - name: 回调 Worker Dashboard
      if: always()
      env:
        CALLBACK_URL: ${{ inputs.callback_url || secrets.WORKER_CALLBACK_URL }}
        CALLBACK_SECRET: ${{ secrets.WORKER_CALLBACK_SECRET }}
      run: |
        if (-not $env:CALLBACK_URL) { echo "跳过回调"; exit 0 }
        if (-not (Test-Path artifacts/register_results.json)) { echo "无结果文件"; exit 0 }
        $results = Get-Content artifacts/register_results.json | ConvertFrom-Json
        $body = @{
          secret = $env:CALLBACK_SECRET
          action = "batch_result"
          data = @{ results = $results }
        } | ConvertTo-Json -Depth 4
        try {
          Invoke-RestMethod -Uri $env:CALLBACK_URL -Method POST -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json; charset=utf-8"
          echo "回调成功，写入 $($results.Count) 个账号"
        } catch {
          echo "回调失败: $_"
        }
