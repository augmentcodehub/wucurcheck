name: 批量注册账号
on:
  workflow_dispatch:
    inputs:
      count:
        description: '注册数量（默认10）'
        required: false
        default: '10'
        type: string
      email_prefix:
        description: '用户名组合（fruit+animal / plant+metal 等）'
        required: false
        default: 'fruit+animal'
        type: string
      email_domain:
        description: '邮箱域名'
        required: false
        default: 'mailto.plus'
        type: string
      password:
        description: '密码'
        required: false
        default: '123Claude&Codex'
        type: string
      callback_url:
        description: '回调地址'
        required: false
        default: ''
        type: string

jobs:
  register:
    runs-on: windows-2025
    environment: production
    env:
      PYTHONIOENCODING: utf-8
    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        version: "latest"

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 缓存 UV 依赖
      uses: actions/cache@v5
      id: uv-cache
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: 安装依赖
      if: steps.uv-cache.outputs.cache-hit != 'true'
      run: uv sync

    - name: 生成并注册账号
      id: register
      env:
        PROVIDERS: ${{ secrets.PROVIDERS }}
      run: |
        New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null

        # 生成账号
        uv run python python/src/tools/account_generation/gen_natural_accounts.py ${{ inputs.count }} "${{ inputs.email_domain }}" "${{ inputs.password }}" "${{ inputs.email_prefix }}" | Out-File -FilePath artifacts/generated_accounts.json -Encoding utf8
        Get-Content artifacts/generated_accounts.json

        # 逐个注册
        $accounts = Get-Content artifacts/generated_accounts.json | ConvertFrom-Json
        $results = @()
        foreach ($account in $accounts) {
          $accountJson = $account | ConvertTo-Json -Compress
          echo "--- 注册: $($account.username) ---"
          $exitCode = 0
          try {
            uv run python python/src/tools/register/register_one_account.py --json-input $accountJson --json
            $exitCode = $LASTEXITCODE
          } catch {
            $exitCode = 1
          }
          $results += @{
            username = $account.username
            password = $account.password
            platform = $account.provider
            status = if ($exitCode -eq 0) { "active" } else { "failed" }
            last_result = if ($exitCode -eq 0) { "注册成功" } else { "注册失败" }
          }
          Start-Sleep -Seconds 10
        }

        $results | ConvertTo-Json -Depth 3 | Out-File -FilePath artifacts/register_results.json -Encoding utf8
        echo "注册完成: $($results.Count) 个账号"

    - name: 回调 Worker Dashboard
      if: always()
      env:
        CALLBACK_URL: ${{ inputs.callback_url || secrets.WORKER_CALLBACK_URL }}
        CALLBACK_SECRET: ${{ secrets.WORKER_CALLBACK_SECRET }}
      run: |
        if (-not $env:CALLBACK_URL) { echo "跳过回调"; exit 0 }
        if (-not (Test-Path artifacts/register_results.json)) { echo "无结果文件"; exit 0 }
        $results = Get-Content artifacts/register_results.json | ConvertFrom-Json
        $body = @{
          secret = $env:CALLBACK_SECRET
          action = "batch_result"
          data = @{ results = $results }
        } | ConvertTo-Json -Depth 4
        try {
          Invoke-RestMethod -Uri $env:CALLBACK_URL -Method POST -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json; charset=utf-8"
          echo "回调成功，写入 $($results.Count) 个账号"
        } catch {
          echo "回调失败: $_"
        }
