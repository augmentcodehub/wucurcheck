name = "worker-dashboard"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ADMIN_USER = "admin"
# Set these via `wrangler secret put`:
# ADMIN_PASS, GITHUB_TOKEN, CALLBACK_SECRET, SESSION_SECRET

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_ID"
